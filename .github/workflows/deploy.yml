- name: Deploy Application
        run: |
          # 1. Kill any old version running on 8080
          sudo fuser -k 8080/tcp || true
          
          # 2. THE SECRET SAUCE: Tell GitHub NOT to kill this process
          export RUNNER_TRACKING_ID=do_not_kill
          
          # 3. Start the app in the background
          nohup python3 app.py > app.log 2>&1 &
          
          # 4. Wait a few seconds to make sure it doesn't crash immediately
          sleep 5
          
          # 5. Verify it's still alive before finishing the job
          netstat -tuln | grep 8080
